<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gym Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #fafafa; font-family: system-ui, sans-serif; padding: 16px; }
    #root { max-width: 600px; margin: 0 auto; }
    
    .controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
    .btn-group { display: flex; border: 1px solid #e0e0e0; border-radius: 10px; overflow: hidden; }
    .btn-group button { flex: 1; padding: 8px; border: none; cursor: pointer; font-size: 14px; background: transparent; }
    .btn-group button.active { background: #EEEDFE; color: #534AB7; font-weight: 600; }
    
    .day-buttons { display: flex; gap: 6px; flex-wrap: wrap; }
    .day-buttons button { padding: 7px 16px; border: 1px solid #e0e0e0; border-radius: 10px; background: transparent; cursor: pointer; font-size: 13px; }
    .day-buttons button.active { background: #f0f0f0; color: #111; border-color: #bbb; font-weight: 600; }
    
    .card { background: white; border: 1px solid #e8e8e8; border-radius: 14px; overflow: hidden; margin-top: 14px; }
    .card-header { padding: 14px 16px; border-bottom: 1px solid #f0f0f0; font-size: 17px; font-weight: 700; color: #111; }
    .card-subheader { padding: 11px 16px; border-bottom: 1px solid #f0f0f0; font-size: 13px; line-height: 1.5; color: #444; background: #E5E2D9; }
    
    .section-header { padding: 7px 16px; font-size: 11px; font-weight: 700; text-transform: uppercase; color: #5F5E5A; background: #F1EFE8; border-top: 1px solid #ece9e0; border-bottom: 1px solid #ece9e0; }
    
    .exercise { padding: 13px 16px; border-bottom: 1px solid #f5f5f5; }
    .exercise-name { font-size: 15px; font-weight: 700; color: #111; margin-bottom: 7px; }
    .exercise-meta { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
    
    .pill { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 500; white-space: nowrap; }
    .pill-muscle { background: #EAF3DE; color: #3B6D11; }
    .pill-eq { background: #EEEBE6; color: #6B6560; }
    .pill-rest { background: #E6F1FB; color: #185FA5; border: none; cursor: pointer; font-family: inherit; }
    
    .actions { display: flex; gap: 14px; margin-top: 10px; }
    .action-btn { font-size: 13px; color: #4a7fcb; background: none; border: none; cursor: pointer; padding: 0; font-weight: 500; }
    
    .guide, .log { display: none; margin-top: 12px; }
    .guide.show, .log.show { display: block; }
    
    .guide { background: #f9f9f9; border-radius: 10px; padding: 11px 13px; }
    .guide-step { display: flex; gap: 8px; margin-bottom: 6px; font-size: 13px; color: #555; line-height: 1.5; }
    .guide-step:last-child { margin-bottom: 0; }
    
    .set-inputs { display: grid; grid-template-columns: 52px 1fr 1fr; gap: 8px; align-items: center; margin-bottom: 12px; }
    input { padding: 12px 10px; border: 1px solid #e0e0e0; border-radius: 10px; background: #fafafa; color: #111; text-align: center; font-size: 16px; }
    textarea { width: 100%; padding: 12px 10px; border: 1px solid #e0e0e0; border-radius: 10px; background: #fafafa; color: #111; font-family: inherit; font-size: 13px; min-height: 80px; margin-top: 10px; }
    
    @media (max-width: 600px) {
      .set-inputs { grid-template-columns: auto 1fr 1fr; gap: 4px; }
      .set-label { display: none; }
      input { padding: 10px 6px; font-size: 14px; }
    }
    
    .unit-toggle { display: flex; border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden; margin-bottom: 10px; }
    .unit-toggle button { flex: 1; padding: 6px 10px; border: none; background: transparent; cursor: pointer; font-size: 11px; font-weight: 400; color: #999; }
    .unit-toggle button.active { background: #F1EFE8; color: #5F5E5A; font-weight: 600; }
    
    .save-btn { background: #EEEDFE; color: #534AB7; border: none; margin-top: 10px; padding: 8px 16px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 13px; }
    
    .history { margin-top: 14px; }
    .history-title { font-size: 12px; font-weight: 700; color: #333; margin-bottom: 7px; }
    .history-entry { margin-bottom: 8px; padding: 9px 11px; background: #f9f9f9; border-radius: 10px; border: 1px solid #eee; font-size: 12px; }
    .history-date { font-weight: 700; color: #555; margin-bottom: 5px; }
    
    .warmup-btn { width: 100%; padding: 11px 16px; display: flex; justify-content: space-between; align-items: center; background: #FFF8F0; border: none; cursor: pointer; }
    .warmup-btn span:first-child { font-size: 14px; font-weight: 700; color: #A0522D; }
    .warmup-item { padding: 8px 0; border-bottom: 1px solid #f5f5f5; }
    .warmup-item:last-child { border-bottom: none; }
    .warmup-name { font-size: 14px; font-weight: 600; color: #111; }
    .warmup-duration { font-size: 11px; color: #A0522D; background: #FFF8F0; padding: 2px 8px; border-radius: 20; white-space: nowrap; font-weight: 500; }
    .warmup-cue { font-size: 12px; color: #777; line-height: 1.5; margin-top: 4px; }
  </style>
</head>

          ]},
          { exercises: [
            { name: 'Cat-cow', duration: '45 s', cue: 'On all fours, arch and round your spine slowly. Mobilises the thoracic spine — key for rows.' },
            { name: 'Band pull-apart', duration: '30 s', cue: 'Arms extended, pull hands apart squeezing rear delts. Direct warm-up for pulling muscles.' },
            { name: 'Scapular retractions', duration: '20 reps', cue: 'Arms at sides, squeeze and release shoulder blades. Activates the mid-back before pulling.' },
            { name: 'Bicep stretch on rack', duration: '30 s each arm', cue: 'Extend arm back on a rack, gentle stretch. Preps the bicep tendon for heavy pulling.' },
            { name: 'Overhead lat stretch', duration: '30 s each side', cue: 'Reach one arm overhead and lean. Stretches the lat through full ROM before pulldowns.' },
          ]},
          { exercises: [
            { name: 'Glute bridge hold', duration: '3 × 10 s hold', cue: 'Feet flat, drive hips up and squeeze hard at the top. Fires up glutes before heavier work.' },
            { name: 'Hip flexor lunge stretch', duration: '30 s each side', cue: 'Low lunge, back knee down. Opens the hip flexor — crucial for hip thrust range.' },
            { name: 'Leg swings (front-back)', duration: '20 reps each leg', cue: 'Big pendulum swings. Warms hamstrings and primes the hip hinge pattern.' },
            { name: 'Hip hinge drill (no weight)', duration: '10 reps', cue: 'Hands on thighs, hinge back feeling the hamstring stretch. Practise before loading it.' },
            { name: 'Clamshells', duration: '20 reps each side', cue: 'Activates the glute medius — stabilises your hips throughout the whole session.' },
          ]},
          { exercises: [
            { name: 'Jumping jacks', duration: '45 s', cue: 'Elevates heart rate immediately. This is your cardio day — start warm.' },
            { name: 'Bodyweight squat to press', duration: '30 s', cue: 'Squat, then drive arms overhead as you stand. Mimics the thruster pattern loaded.' },
            { name: 'Inchworm', duration: '6 reps', cue: 'Walk hands out to a plank and back. Mobilises the whole posterior chain and shoulders.' },
            { name: 'Hip circles + torso rotation', duration: '30 s', cue: 'Rotate hips and then torso in big circles. Preps the core for rotational work.' },
            { name: 'High knees', duration: '30 s', cue: 'Keep it brisk. You want to feel slightly warm before the first set.' },
          ]},
        ];
        return warmups[this.dayIdx];
      },
      
      render() {
        const root = document.getElementById('root');
        const plan = this.getPlan();
        const warmup = this.getWarmup();
        
        let html = `
          <div class="controls">
            <div class="btn-group">
              <button class="${this.week === 'A' ? 'active' : ''}" onclick="app.setWeek('A')">Week A</button>
              <button class="${this.week === 'B' ? 'active' : ''}" onclick="app.setWeek('B')">Week B</button>
            </div>
            <div class="day-buttons">
              ${['Mon', 'Tue', 'Wed', 'Thu', 'Fri'].map((day, i) => `
                <button class="${this.dayIdx === i ? 'active' : ''}" onclick="app.setDay(${i})">${day}</button>
              `).join('')}
            </div>
          </div>
          
          <div class="card">
            <div class="card-header">${plan.title}</div>
            <div class="card-subheader">${plan.tip}</div>
            
            <button class="warmup-btn" onclick="app.toggleWarmup()">
              <span>🔥 5-min Warmup</span>
              <span style="color: #A0522D; font-weight: 500;">${this.openWarmup ? 'Hide ↑' : 'Show ↓'}</span>
            </button>
            
            ${this.openWarmup ? `
              <div style="padding: 4px 16px 12px;">
                ${warmup.exercises.map(w => `
                  <div class="warmup-item">
                    <div style="display: flex; justify-content: space-between; align-items: baseline; gap: 8px; margin-bottom: 3px;">
                      <div class="warmup-name">${w.name}</div>
                      <span class="warmup-duration">${w.duration}</span>
                    </div>
                    <div class="warmup-cue">${w.cue}</div>
                  </div>
                `).join('')}
              </div>
            ` : ''}
            
            ${plan.sections.map(section => `
              <div class="section-header">${section.name}</div>
              ${section.exercises.map((ex, i) => this.renderExercise(ex, section.name, i)).join('')}
            `).join('')}
          </div>
        `;
        
        root.innerHTML = html;
      },
      
      renderExercise(ex, sectionName, i) {
        const key = `${this.week}_${this.dayIdx}_${sectionName}_${i}`;
        const history = this.log[key] || [];
        const showGuide = this.openGuides[key];
        const showLog = this.openLogs[key];
        
        let html = `
          <div class="exercise">
            <div class="exercise-name">${ex.name}</div>
            <div class="exercise-meta">
              <span class="pill pill-muscle">${ex.muscles}</span>
              <span class="pill pill-eq">${ex.eq}</span>
              <button class="pill pill-rest" onclick="app.startTimer(${ex.restSecs})" style="border: none; cursor: pointer; font-family: inherit;">⏱ ${ex.rest}</button>
              <span style="font-size: 13px; color: #666; font-weight: 500;">${ex.sets}</span>
            </div>
            <div class="actions">
              <button class="action-btn" onclick="app.toggleGuide('${key}')">${showGuide ? 'Hide guide ↑' : 'How to do it ↓'}</button>
              <button class="action-btn" onclick="app.toggleLog('${key}')" style="color: ${history.length > 0 ? '#0F6E56' : '#aaa'}">
                ${showLog ? 'Hide log ↑' : `Log sets${history.length > 0 ? ` (${history.length})` : ''} ↓`}
              </button>
            </div>
            
            ${showGuide ? `
              <div class="guide show">
                ${ex.guide.map((step, si) => `
                  <div class="guide-step">
                    <span style="font-weight: 700; color: #333; min-width: 18px;">${si + 1}.</span>
                    <span>${step}</span>
                  </div>
                `).join('')}
              </div>
            ` : ''}
            
            ${showLog ? `
              <div class="log show">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                  <div style="font-size: 13px; color: #666; font-weight: 500;">Sets: ${ex.sets}</div>
                  <div class="unit-toggle">
                    <button class="${(this.units[key] || 'kg') === 'kg' ? 'active' : ''}" onclick="app.setUnit('${key}', 'kg')">kg</button>
                    <button class="${(this.units[key] || 'kg') === 'lbs' ? 'active' : ''}" onclick="app.setUnit('${key}', 'lbs')">lbs</button>
                  </div>
                </div>
                <div style="display: grid; grid-template-columns: 52px 1fr 1fr; gap: 8px; margin-bottom: 5px;">
                  <div style="font-size: 11px; color: #bbb; font-weight: 500;"></div>
                  <div style="font-size: 11px; color: #bbb; font-weight: 500;">Weight (${(this.units[key] || 'kg')})</div>
                  <div style="font-size: 11px; color: #bbb; font-weight: 500;">Reps</div>
                </div>
                ${[0,1,2,3].map(j => `
                  <div class="set-inputs">
                    <span style="font-size: 13px; color: #999; font-weight: 500;">Set ${j+1}</span>
                    <input type="text" id="weight-${key}-${j}" placeholder="—">
                    <input type="text" id="reps-${key}-${j}" placeholder="—">
                  </div>
                `).join('')}
                <textarea id="notes-${key}" placeholder="e.g. felt strong, grip slipping..."></textarea>
                <button class="save-btn" onclick="app.saveExercise('${key}')">Save</button>
                ${history.length > 0 ? `
                  <div class="history">
                    <div class="history-title">Previous sessions</div>
                    ${history.map((session, hi) => `
                      <div class="history-entry">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                          <div class="history-date">${session.date}</div>
                          <button class="action-btn" onclick="app.editSession('${key}', ${hi})" style="font-size: 12px;">Edit</button>
                        </div>
                        ${session.sets.map((s, si) => `
                          <div class="history-set">
                            <span style="color: #bbb; min-width: 42px;">Set ${si+1}</span>
                            ${s.weight ? `<span>${s.weight} ${session.unit || 'kg'}</span>` : ''}
                            ${s.reps ? `<span>${s.reps} reps</span>` : ''}
                          </div>
                        `).join('')}
                        ${session.notes ? `<div style="font-size: 12px; color: #aaa; font-style: italic; margin-top: 4px; padding-top: 4px; border-top: 1px solid #f0f0f0;">📝 ${session.notes}</div>` : ''}
                      </div>
                    `).join('')}
                  </div>
                ` : ''}
              </div>
            ` : ''}
          </div>
        `;
        
        return html;
      },
      
      setWeek(w) { this.week = w; this.render(); },
      setDay(i) { this.dayIdx = i; this.render(); },
      toggleWarmup() { this.openWarmup = !this.openWarmup; this.render(); },
      toggleGuide(key) { this.openGuides[key] = !this.openGuides[key]; this.render(); },
      toggleLog(key) { this.openLogs[key] = !this.openLogs[key]; this.render(); },
      
      saveExercise(key) {
        const sets = [];
        for (let i = 0; i < 4; i++) {
          const w = document.getElementById(`weight-${key}-${i}`)?.value || '';
          const r = document.getElementById(`reps-${key}-${i}`)?.value || '';
          if (w || r) sets.push({ weight: w, reps: r });
        }
        
        if (sets.length === 0) return;
        
        const notes = document.getElementById(`notes-${key}`)?.value || '';
        const date = new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
        const unit = this.units[key] || 'kg';
        
        if (!this.log[key]) this.log[key] = [];
        this.log[key].unshift({ date, sets, notes, unit });
        this.log[key] = this.log[key].slice(0, 5);
        
        this.saveLog();
        alert('Saved!');
        this.render();
      },
      
      startTimer(secs) {
        alert(`Rest for ${secs} seconds`);
      },
      
      setUnit(key, unit) {
        this.units[key] = unit;
        this.render();
      },
      
      editSession(key, historyIdx) {
        if (!this.log[key] || !this.log[key][historyIdx]) return;
        
        const session = this.log[key][historyIdx];
        
        // Set the unit
        this.units[key] = session.unit || 'kg';
        
        // Move to top
        const edited = this.log[key].splice(historyIdx, 1)[0];
        this.log[key].unshift(edited);
        
        this.saveLog();
        this.render();
        
        // Fill in the form after render
        setTimeout(() => {
          for (let i = 0; i < edited.sets.length; i++) {
            const wEl = document.getElementById(`weight-${key}-${i}`);
            const rEl = document.getElementById(`reps-${key}-${i}`);
            if (wEl) wEl.value = edited.sets[i].weight || '';
            if (rEl) rEl.value = edited.sets[i].reps || '';
          }
          const notesEl = document.getElementById(`notes-${key}`);
          if (notesEl) notesEl.value = edited.notes || '';
        }, 50);
      }
    };
    
    app.init();
  </script>
</body>
</html>
